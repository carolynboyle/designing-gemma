# =============================================================================
# experiments/05_srb_sentence_gen/config.yaml
# Sr. Barbara sentence generation experiment — TEST VERSION
#
# Uses truncated ~250-word corpora to test whether context window overflow
# was causing the hallucination/corpus-ignore failure mode.
#
# If models extract actual sentences from these texts rather than
# hallucinating, the bug is confirmed as context overflow and num_ctx
# is the real fix for the full corpora.
#
# Move this file to config.yaml and move the original to config_full.yaml
# before running this test.
# =============================================================================

experiment:
  name: srb_sentence_gen
  description: >
    TEST RUN — truncated ~250-word corpora to diagnose context overflow.
    Ask Gemma to extract grammatically suitable sentences from provided
    source text and generate valid PostgreSQL INSERT statements for the
    Sr. Barbara's Class sentence diagramming game. Output is staged SQL
    reviewed and selectively applied by a human via Adminer. Never
    auto-applied.
  experiment_version: 1
  target_repo: https://github.com/carolynboyle/sr-barbara
  target_branch: ~

model:
  temperature: 0.3

prompts:
  prompt_dir: prompts/
  prompts:
    - file: unguided.md
      label: unguided
      description: >
        Source text + three worked SQL examples from seed.sql. Gemma infers
        schema from examples. No explicit POS lists or phrase role constraints.

corpora:
  - label: wodehouse_test
    source_type: file
    source: corpora/wodehouse_test
    status: active
    note: >
      P.G. Wodehouse, Love Among the Chickens. ~250 words.
      Ukridge introduction scene. Test corpus — context overflow diagnosis.

  - label: austen_test
    source_type: file
    source: corpora/austen_test
    status: active
    note: >
      Jane Austen, Pride and Prejudice. ~250 words.
      Opening scene. Test corpus — context overflow diagnosis.

  - label: doyle_test
    source_type: file
    source: corpora/doyle_test
    status: active
    note: >
      Arthur Conan Doyle, The Red-Headed League. ~250 words.
      Opening scene. Test corpus — context overflow diagnosis.

  - label: kafka_test
    source_type: file
    source: corpora/kafka_test
    status: active
    note: >
      Franz Kafka, The Metamorphosis. ~250 words.
      Opening scene. Test corpus — context overflow diagnosis.

results:
  results_dir: results/
  output: per_run
